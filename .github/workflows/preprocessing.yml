# .github/workflows/preprocessing.yml
name: Data Preprocessing Automation

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tensorflow==2.19.0 numpy

      - name: Run Preprocessing Script
        run: |
          python "preprocessing/automate_Adji Setyawan Saputra.py" --input ./fruits-360-raw/Training --output ./preprocessing/fruits_preprocessing
      - name: Upload Preprocessed Data as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-dataset
          path: ./preprocessing/fruits_preprocessing/
